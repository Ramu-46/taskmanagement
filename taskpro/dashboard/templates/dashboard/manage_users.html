<h2>User Management</h2>
<table border="1">
  <tr>
    <th>Username</th>
    <th>Email</th>
    <th>Is Staff</th>
    <th>Is Superuser</th>
  </tr>
  {% for user in users %}
  <tr>
    <td>{{ user.username }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.is_staff }}</td>
    <td>{{ user.is_superuser }}</td>
  </tr>
  {% endfor %}
</table>
